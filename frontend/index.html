<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Recommender Pro</title>
    <!-- Memanggil Tailwind CSS langsung dari CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col md:flex-row">

    <!-- SIDEBAR: Profil Pemain -->
    <aside class="w-full md:w-80 bg-gray-800 p-6 shadow-xl border-r border-gray-700 flex flex-col h-auto md:h-screen sticky top-0 overflow-y-auto">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-blue-400 flex items-center gap-2">
                🎮 RecSys Pro
            </h1>
            <p class="text-gray-400 text-sm mt-2">Ditenagai oleh XGBoost ML</p>
        </div>

        <h2 class="text-lg font-semibold mb-4 border-b border-gray-600 pb-2">1. Pilih Genre Favoritmu</h2>
        <!-- Kontainer tempat Checkbox Genre akan dimunculkan oleh JS -->
        <div id="genre-container" class="space-y-2 mb-8 flex-grow">
            <p class="text-gray-500 italic text-sm">Memuat daftar genre...</p>
        </div>

        <button id="btn-recommend" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition duration-300 shadow-lg shadow-blue-500/30">
            Cari Rekomendasi!
        </button>
    </aside>

    <!-- MAIN AREA: Hasil Rekomendasi -->
    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
        <header class="mb-10">
            <h2 class="text-3xl font-bold mb-2">Toko Game Pintar 🛒</h2>
            <p class="text-gray-400">Pilih genre di sebelah kiri untuk melihat keajaiban algoritma kami.</p>
        </header>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-700 h-24 w-24 mb-4"></div>
            <p class="text-xl text-blue-400 font-semibold animate-pulse">Menghitung jutaan probabilitas...</p>
        </div>

        <!-- Kontainer Grid Kartu Game -->
        <div id="results-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
            <!-- Kartu Game akan disuntikkan ke sini oleh JS -->
        </div>
        
        <!-- Pesan Kosong -->
        <div id="empty-state" class="text-center py-20">
            <span class="text-6xl mb-4 block">👈</span>
            <h3 class="text-2xl font-medium text-gray-500">Belum ada rekomendasi.</h3>
            <p class="text-gray-600">Silakan atur profilmu dan klik tombol pencarian.</p>
        </div>
    </main>

    <!-- Menghubungkan logika JavaScript -->
    <script src="app.js"></script>
</body>
</html>
